  <style>
    .construction {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 32px;
      background: var(--bege-papel);
      position: relative;
      overflow: hidden;
    }
    .construction::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url('assets/prontu-monogram.png');
      background-repeat: no-repeat;
      background-position: 110% -10%;
      background-size: 70% auto;
      opacity: 0.05;
      pointer-events: none;
    }
    .construction__inner {
      position: relative;
      max-width: 640px;
      animation: fadeUp 720ms var(--ease-out);
    }
    .construction__logo {
      width: 240px;
      max-width: 80vw;
      height: auto;
      margin: 0 auto 40px;
      display: block;
    }
    .construction__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: var(--fw-medium);
      letter-spacing: var(--ls-eyebrow);
      text-transform: uppercase;
      color: var(--azul-profundo);
      margin-bottom: 24px;
    }
    .construction__eyebrow::before,
    .construction__eyebrow::after {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--dourado-premium);
    }
    .construction__title {
      font-family: var(--font-display);
      font-size: clamp(40px, 6vw, 64px);
      font-weight: var(--fw-regular);
      line-height: 1.1;
      letter-spacing: var(--ls-display);
      color: var(--azul-profundo);
      margin: 0 0 20px;
    }
    .construction__title em {
      font-style: italic;
      color: var(--dourado-700);
    }
    .construction__title .accent {
      color: var(--dourado-premium);
    }
    .construction__text {
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1.6;
      color: var(--neutral-600);
      margin: 0 0 40px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }
    .construction__cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--azul-profundo);
      color: #fff;
      font-family: var(--font-body);
      font-weight: var(--fw-medium);
      font-size: 16px;
      padding: 16px 32px;
      border-radius: var(--r-pill);
      text-decoration: none;
      transition: all var(--t-base) var(--ease-out);
    }
    .construction__cta:hover {
      background: var(--azul-800);
      box-shadow: var(--shadow-md);
    }
    .construction__contact {
      margin-top: 56px;
      padding-top: 32px;
      border-top: 1px solid var(--neutral-200);
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--neutral-600);
    }
    .construction__contact a {
      color: var(--azul-profundo);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color var(--t-base);
    }
    .construction__contact a:hover {
      border-bottom-color: var(--dourado-premium);
    }
    .construction__contact svg {
      vertical-align: -3px;
      margin-right: 6px;
      color: var(--dourado-premium);
    }
    .construction__signature {
      margin-top: 32px;
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: var(--ls-eyebrow);
      text-transform: uppercase;
      color: var(--neutral-500);
    }
  </style>
</head>
<body>

  <main class="construction">
    <div class="construction__inner">
      <img class="construction__logo" src="assets/prontu-logo-full-transparent.png" alt="Prontu! Assessoria em Gestão" />

      <span class="construction__eyebrow">Em construção</span>
      <h1 class="construction__title">Estamos preparando algo <em>especial</em><span class="accent">.</span></h1>
      <p class="construction__text">
        A nova experiência da Prontu! está chegando. Enquanto isso, a gente segue por aqui — pessoalmente, como sempre.
